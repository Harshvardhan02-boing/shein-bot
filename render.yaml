services:
  - type: worker
    name: shein-vault-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: DB_PATH
        value: /data/bot.db
    disk:
      name: vault-data
      mountPath: /data
      sizeGB: 1
